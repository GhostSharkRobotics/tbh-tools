<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBH クラフト素材 / Crafting Materials</title>
<style>
  :root{--bg:#14110d;--surface:#1f1b15;--surface2:#262017;--accent:#d8a657;--text:#ece3d2;--muted:#9a8f7a;--border:#3a342a;
    --g-common:#9aa0a6;--g-uncommon:#5fb35f;--g-rare:#4f8fe0;--g-legendary:#c98b2e;--g-immortal:#d05b5b;--g-arcana:#a05fd0;--g-beyond:#d84f9a;--g-celestial:#3fb6c0;--g-cosmic:#6f7fe0;--g-divine:#e0c850;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;line-height:1.6;padding:24px;max-width:880px;margin:0 auto;}
  h1{font-size:24px;color:var(--accent);margin-bottom:4px;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
  .back{font-size:13px;color:var(--muted);text-decoration:none;}
  .back:hover{color:var(--accent);}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
  .flabel{font-size:12px;color:var(--muted);margin-right:4px;width:48px;}
  .frow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px;}
  button.chip{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;}
  button.chip:hover{border-color:var(--accent);}
  button.chip.on{background:var(--accent);color:#1a1610;border-color:var(--accent);font-weight:600;}
  .count{font-size:12px;color:var(--muted);margin:10px 0 14px;}
  .recipe{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .rhead{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .rtitle{font-size:17px;font-weight:600;color:var(--accent);}
  .rmeta{font-size:12px;color:var(--muted);}
  .mat{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;text-decoration:none;color:var(--text);}
  .mat:hover{border-color:var(--accent);}
  .mat:last-child{margin-bottom:0;}
  .grade-dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .micon{width:40px;height:40px;flex:none;border-radius:6px;background:#0d0b08;border:1px solid var(--border);object-fit:contain;}
  .mname{font-size:14px;font-weight:600;}
  .men{font-size:11px;color:var(--muted);}
  .mqty{font-size:13px;color:var(--text);margin-left:auto;white-space:nowrap;}
  .mprice{font-size:12px;color:var(--accent);white-space:nowrap;min-width:62px;text-align:right;}
  .gbadge{font-size:10px;padding:1px 6px;border-radius:4px;color:#1a1610;font-weight:700;}
  .steam{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 7px;white-space:nowrap;}
  .odds{font-size:11px;color:var(--muted);margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;}
  .odds b{color:var(--text);font-weight:600;}
  .note{font-size:12px;color:var(--muted);margin-top:22px;border-top:1px solid var(--border);padding-top:12px;}
  .loading{color:var(--muted);padding:30px 0;text-align:center;}
</style>
</head>
<body>
<a class="back" href="index.html">← ツール一覧</a>
<h1>🧱 クラフト素材</h1>
<div class="sub">タスクバーヒーローの装備クラフト（キューブ）レシピと必要素材。素材名をタップで Steam マーケットへ。</div>

<div class="filters" id="tierFilter"></div>
<div class="filters" id="typeFilter"></div>
<div class="count" id="count"></div>
<div id="list"><div class="loading">読み込み中…</div></div>

<div class="note">
  データは <code>tbh-data.json</code> の <code>crafting.recipes</code> 由来。価格は <code>tbh-prices.json</code>（Steam相場）のスナップショットで、最安（sell）を表示。<br>
  数値はコミュニティwiki由来でやや不確実、実機の値が優先。
</div>

<script>
const APPID="3678970";
const GORDER=["COMMON","UNCOMMON","RARE","LEGENDARY","IMMORTAL","ARCANA","CELESTIAL","COSMIC","DIVINE","BEYOND"];
const GCOLOR={COMMON:"--g-common",UNCOMMON:"--g-uncommon",RARE:"--g-rare",LEGENDARY:"--g-legendary",IMMORTAL:"--g-immortal",ARCANA:"--g-arcana",CELESTIAL:"--g-celestial",COSMIC:"--g-cosmic",DIVINE:"--g-divine",BEYOND:"--g-beyond"};
const GJA={COMMON:"コモン",UNCOMMON:"アンコモン",RARE:"レア",LEGENDARY:"レジェンド",IMMORTAL:"イモータル",ARCANA:"アルカナ",CELESTIAL:"セレスティアル",COSMIC:"コズミック",DIVINE:"ディバイン",BEYOND:"ビヨンド"};
let RECIPES=[], PRICES={}, ICONS={}, ICON_CDN="";
let curTier=null, curType=null;
function iconUrl(m){const h=m.icon&&ICONS[m.icon];return h?ICON_CDN+h:null;}

function gradeColor(g){return getComputedStyle(document.documentElement).getPropertyValue(GCOLOR[g]||"--muted").trim()||"#9a8f7a";}
function priceOf(nameEn){const p=PRICES[nameEn];return p&&p.sell!=null?p.sell:null;}
function steamUrl(m){
  if(PRICES[m.nameEn]) return "https://steamcommunity.com/market/listings/"+APPID+"/"+encodeURIComponent(m.nameEn);
  return "https://steamcommunity.com/market/search?appid="+APPID+"&q="+encodeURIComponent(m.nameEn);
}

function render(){
  const list=document.getElementById('list');
  let rs=RECIPES.slice();
  if(curTier!=null) rs=rs.filter(r=>r.tier===curTier);
  if(curType!=null) rs=rs.filter(r=>r.typeJa===curType);
  document.getElementById('count').textContent=rs.length+" レシピ";
  if(!rs.length){list.innerHTML='<div class="loading">該当なし</div>';return;}
  list.innerHTML=rs.map(r=>{
    const lvl=r.levelMin===r.levelMax?("Lv"+r.levelMin):("Lv"+r.levelMin+"〜"+r.levelMax);
    const mats=r.materials.map(m=>{
      const col=gradeColor(m.grade);
      const pr=priceOf(m.nameEn);
      const prTxt=pr!=null?(pr.toLocaleString()+"G"):"—";
      const iu=iconUrl(m);
      const iconHtml=iu?`<img class="micon" src="${iu}" alt="" loading="lazy" style="border-color:${col}">`:`<span class="grade-dot" style="background:${col}"></span>`;
      return `<a class="mat" href="${steamUrl(m)}" target="_blank" rel="noopener">
        ${iconHtml}
        <span>
          <span class="mname">${m.nameJa}</span>
          <span class="gbadge" style="background:${col}">${GJA[m.grade]||m.grade}</span><br>
          <span class="men">${m.nameEn}</span>
        </span>
        <span class="mqty">×${m.count}</span>
        <span class="mprice">${prTxt}</span>
        <span class="steam">Steam ↗</span>
      </a>`;
    }).join("");
    const odds=(r.gradeOdds||[]).map(o=>{
      const col=gradeColor(o.grade);
      return `<span style="color:${col}"><b>${GJA[o.grade]||o.grade}</b> ${o.pct}%</span>`;
    }).join("");
    const oddsBlock=odds?`<div class="odds">出来上がりグレード: ${odds}</div>`:"";
    return `<div class="recipe">
      <div class="rhead">
        <span class="rtitle">${r.typeJa}</span>
        <span class="rmeta">Tier ${r.tier} ・ ${lvl}${r.resultDistinct?" ・ "+r.resultDistinct+"種":""}</span>
      </div>
      ${mats}
      ${oddsBlock}
    </div>`;
  }).join("");
}

function buildFilters(){
  const tiers=[...new Set(RECIPES.map(r=>r.tier))].sort((a,b)=>a-b);
  const tf=document.getElementById('tierFilter');
  tf.innerHTML='<span class="flabel">Tier</span>'+
    '<button class="chip on" data-t="all">すべて</button>'+
    tiers.map(t=>{
      const r=RECIPES.find(x=>x.tier===t);
      const lvl=r.levelMin===r.levelMax?("Lv"+r.levelMin):("Lv"+r.levelMin+"〜"+r.levelMax);
      return `<button class="chip" data-t="${t}">T${t} (${lvl})</button>`;
    }).join("");
  tf.addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    tf.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    curTier=b.dataset.t==="all"?null:+b.dataset.t;render();
  });
  const types=[...new Set(RECIPES.map(r=>r.typeJa))];
  const yf=document.getElementById('typeFilter');
  yf.innerHTML='<span class="flabel">部位</span>'+
    '<button class="chip on" data-y="all">すべて</button>'+
    types.map(t=>`<button class="chip" data-y="${t}">${t}</button>`).join("");
  yf.addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    yf.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    curType=b.dataset.y==="all"?null:b.dataset.y;render();
  });
}

Promise.all([
  fetch('tbh-data.json').then(r=>r.json()),
  fetch('tbh-prices.json').then(r=>r.json()).catch(()=>({prices:{}}))
]).then(([data,prices])=>{
  RECIPES=((data.crafting&&data.crafting.recipes)||[]).slice().sort((a,b)=>a.tier-b.tier);
  PRICES=(prices&&prices.prices)||{};
  ICONS=data.icons||{};
  ICON_CDN=(data._meta&&data._meta.iconCdn)||"";
  buildFilters();
  render();
}).catch(err=>{
  document.getElementById('list').innerHTML='<div class="loading">データ読み込みに失敗しました: '+err+'</div>';
});
</script>
<script src="analytics.js"></script>
</body>
</html>
