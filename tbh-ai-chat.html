<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBH AIチャット / Ask Anything</title>
<style>
  :root{--bg:#14110d;--surface:#1f1b15;--surface2:#2a251d;--accent:#d8a657;--text:#ece3d2;--muted:#9a8f7a;--border:#3a342a;--warn:#d89a4a;--down:#d87a7a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;line-height:1.55;font-size:14px;
       max-width:820px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:18px 18px 0;}
  h1{font-size:20px;font-weight:600;color:var(--accent);}
  .sub{font-size:12px;color:var(--muted);margin:2px 0 12px;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .bar a{font-size:12px;color:var(--muted);text-decoration:none;}
  .bar a:hover{color:var(--accent);}
  #banner{display:none;background:#2a2418;border:1px solid #4a3f28;border-radius:8px;padding:10px 13px;font-size:12px;color:var(--muted);margin-bottom:12px;}
  #banner code{background:var(--surface2);padding:1px 6px;border-radius:4px;color:var(--text);}
  #thread{flex:1;overflow-y:auto;padding-bottom:8px;}
  .msg{margin:10px 0;}
  .msg .who{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.04em;}
  .msg.u{text-align:right;}
  .msg.u .bubble{background:var(--surface2);border:1px solid var(--border);border-radius:11px 11px 3px 11px;padding:8px 12px;display:inline-block;text-align:left;max-width:85%;white-space:pre-wrap;}
  .msg.a .bubble{background:var(--surface);border:1px solid var(--border);border-radius:11px 11px 11px 3px;padding:10px 13px;}
  .md p{margin:6px 0;} .md .aih{font-weight:600;color:var(--accent);margin:11px 0 4px;font-size:13px;}
  .md ul,.md ol{margin:6px 0 6px 20px;} .md li{margin:2px 0;}
  .md code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;}
  .md table.aitbl{border-collapse:collapse;margin:8px 0;width:100%;}
  .md .aitbl th,.md .aitbl td{border:1px solid var(--border);padding:4px 9px;text-align:left;font-size:12px;vertical-align:top;}
  .md .aitbl th{color:var(--muted);font-weight:600;background:var(--surface);}
  #status{font-size:12px;color:var(--accent);min-height:18px;padding:2px 2px 6px;}
  .composer{position:sticky;bottom:0;background:var(--bg);padding:10px 0 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
  .composer textarea{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;resize:none;line-height:1.4;max-height:160px;}
  .composer textarea:focus{outline:none;border-color:var(--accent);}
  .composer button{background:var(--accent);border:none;color:#1a160f;border-radius:10px;padding:0 20px;font-size:15px;font-weight:600;cursor:pointer;}
  .composer button:disabled{opacity:.5;cursor:default;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 0;}
  .empty .ex{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:5px 12px;margin:4px;cursor:pointer;color:var(--text);}
  .empty .ex:hover{border-color:var(--accent);}
</style>
</head>
<body>
<div class="bar">
  <div><h1>TBH AIチャット</h1><div class="sub">アイテム・装飾・価格・ステージ・敵・クラス・スキルまで横断で質問。履歴はこの端末に保存され、続きから会話できます。</div></div>
  <a id="reset" href="#" title="会話を消して最初から">🗑 新しい会話</a>
</div>

<div id="banner"></div>
<div id="thread"></div>
<div id="status"></div>

<div class="composer">
  <textarea id="q" rows="1" placeholder="TBHについて何でも質問（例: トーメント3-3を抜けるおすすめ装備は？）"></textarea>
  <button id="send">送信</button>
</div>

<script>
const AI_BASE=(location.port==='8765')?'':'http://localhost:8765';
const el=id=>document.getElementById(id);
const LSK='tbh_aichat_v1';

// ---- 状態（履歴＋セッション）を localStorage に保存 ----
function load(){ try{return JSON.parse(localStorage.getItem(LSK))||{msgs:[],session:null};}catch(e){return {msgs:[],session:null};} }
function save(){ try{localStorage.setItem(LSK,JSON.stringify(S));}catch(e){} }
let S=load();

// ---- 軽量Markdown ----
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');}
function md(src){
  const L=String(src||'').split('\n'); let h='',i=0;
  const cells=l=>l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
  while(i<L.length){
    const ln=L[i];
    if(/\|/.test(ln) && i+1<L.length && /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(L[i+1])){
      const head=cells(ln); i+=2; const rows=[];
      while(i<L.length && /\|/.test(L[i])){ rows.push(cells(L[i])); i++; }
      h+='<table class="aitbl"><thead><tr>'+head.map(c=>'<th>'+inl(c)+'</th>').join('')+'</tr></thead><tbody>'+
         rows.map(r=>'<tr>'+r.map(c=>'<td>'+inl(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>'; continue;
    }
    const hm=ln.match(/^(#{1,6})\s+(.*)$/);
    if(hm){ h+='<div class="aih">'+inl(hm[2])+'</div>'; i++; continue; }
    if(/^\s*[-*]\s+/.test(ln)){ const it=[]; while(i<L.length && /^\s*[-*]\s+/.test(L[i])){ it.push(L[i].replace(/^\s*[-*]\s+/,'')); i++; } h+='<ul>'+it.map(x=>'<li>'+inl(x)+'</li>').join('')+'</ul>'; continue; }
    if(/^\s*\d+\.\s+/.test(ln)){ const it=[]; while(i<L.length && /^\s*\d+\.\s+/.test(L[i])){ it.push(L[i].replace(/^\s*\d+\.\s+/,'')); i++; } h+='<ol>'+it.map(x=>'<li>'+inl(x)+'</li>').join('')+'</ol>'; continue; }
    if(ln.trim()===''){ i++; continue; }
    const para=[ln]; i++;
    while(i<L.length && L[i].trim()!=='' && !/^\s*[-*]\s+/.test(L[i]) && !/^\s*\d+\.\s+/.test(L[i]) && !/^#{1,6}\s/.test(L[i]) && !/\|/.test(L[i])){ para.push(L[i]); i++; }
    h+='<p>'+para.map(inl).join('<br>')+'</p>';
  }
  return h;
}

// ---- スレッド描画 ----
const EXAMPLES=['トーメント3-3を抜けるおすすめ装備は？','クリダメを安く盛れる装飾を価格つきで','レンジャーで物理DPSが伸びるパッシブは？','ナイトのおすすめスキル構成'];
function renderThread(){
  const t=el('thread'); t.innerHTML='';
  if(!S.msgs.length){
    t.innerHTML='<div class="empty">まだ会話がありません。何でも聞いてください。<br>'+
      EXAMPLES.map(e=>'<span class="ex">'+esc(e)+'</span>').join('')+'</div>';
    [...t.querySelectorAll('.ex')].forEach(x=>x.onclick=()=>{el('q').value=x.textContent; el('q').focus(); autoGrow();});
    return;
  }
  S.msgs.forEach(m=>{
    const d=document.createElement('div'); d.className='msg '+m.role;
    d.innerHTML='<div class="who">'+(m.role==='u'?'あなた':'AI')+'</div><div class="bubble">'+
      (m.role==='u'?esc(m.text):'<div class="md">'+md(m.text)+'</div>')+'</div>';
    t.appendChild(d);
  });
  t.scrollTop=t.scrollHeight;
}

// ---- SSEストリーム受信 ----
async function streamPost(payload, onProgress){
  const r=await fetch(AI_BASE+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.body) throw new Error('no stream');
  const reader=r.body.getReader(), dec=new TextDecoder(); let buf='', result=null, err=null, sid=null;
  while(true){
    const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true}); let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const line=buf.slice(0,i).replace(/^data: ?/,'').trim(); buf=buf.slice(i+2);
      if(!line) continue; let ev; try{ev=JSON.parse(line);}catch(e){continue;}
      if(ev.progress) onProgress&&onProgress(ev.progress);
      else if(ev.error) err=ev.error;
      else if(ev.done){ result=ev.result; sid=ev.session_id||null; }
    }
  }
  if(err) throw new Error(err);
  return {result, sid};
}

let busy=false, timer=null;
async function ask(){
  if(busy) return;
  const q=el('q').value.trim(); if(!q) return;
  busy=true; el('send').disabled=true;
  S.msgs.push({role:'u',text:q}); save();
  el('q').value=''; autoGrow(); renderThread();
  const st=el('status'); const t0=Date.now(); let last='AIを起動中…';
  const tick=()=>{ st.textContent=last+'  （'+Math.floor((Date.now()-t0)/1000)+'秒）'; };
  if(timer)clearInterval(timer); tick(); timer=setInterval(tick,1000);
  try{
    const {result,sid}=await streamPost({question:q, session_id:S.session||undefined}, m=>{last=m;tick();});
    if(sid) S.session=sid;
    S.msgs.push({role:'a',text:(result&&result.answer)||'(空の回答)'}); save(); renderThread();
  }catch(e){
    const down=String(e.message).includes('fetch');
    S.msgs.push({role:'a',text:down?'⚠ ローカルAIサーバに接続できませんでした。ターミナルで `python3 tbh-ai-server.py` を起動し、`http://localhost:8765/tbh-ai-chat.html` を開いてください。':'⚠ エラー: '+e.message});
    save(); renderThread();
  }finally{
    clearInterval(timer); timer=null; st.textContent=''; busy=false; el('send').disabled=false; el('q').focus();
  }
}

// ---- サーバ検出（このページはAI必須なので、無ければ案内を出す） ----
async function health(){
  try{
    const c=new AbortController(); const t=setTimeout(()=>c.abort(),1800);
    const r=await fetch(AI_BASE+'/health',{signal:c.signal}); clearTimeout(t);
    if(r.ok){ el('banner').style.display='none'; return; }
    throw 0;
  }catch(e){
    el('banner').style.display='';
    el('banner').innerHTML='⚠ ローカルAIサーバが見つかりません（このチャットは <b>tbh-ai-server.py</b> を起動した端末でのみ動きます）。<br>'+
      'ターミナルで <code>python3 tbh-ai-server.py</code> を実行 → <code>http://localhost:8765/tbh-ai-chat.html</code> を開いてください。';
  }
}

// ---- 入力欄オートサイズ＋Enter送信（Shift+Enterで改行） ----
function autoGrow(){ const a=el('q'); a.style.height='auto'; a.style.height=Math.min(a.scrollHeight,160)+'px'; }
el('q').addEventListener('input',autoGrow);
el('q').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ask(); } });
el('send').onclick=ask;
el('reset').onclick=e=>{ e.preventDefault(); if(S.msgs.length && !confirm('この端末の会話履歴を消して新しい会話を始めますか？'))return; S={msgs:[],session:null}; save(); renderThread(); el('q').focus(); };

renderThread(); health(); el('q').focus();
</script>
<script src="analytics.js"></script>
</body>
</html>
