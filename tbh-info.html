<script>
// minimal markdown renderer (headings/bold/code/hr/list/table/blockquote)
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}
function render(md){
  const lines=md.replace(/\r/g,'').split('\n');
  let html='',i=0,toc=[];
  while(i<lines.length){
    let ln=lines[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    // table: header row + |---| separator
    if(/^\|.*\|/.test(ln) && i+1<lines.length && /^\|[\s:|-]+\|/.test(lines[i+1])){
      const cells=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head=cells(ln); i+=2; let body='';
      while(i<lines.length && /^\|.*\|/.test(lines[i])){body+='<tr>'+cells(lines[i]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';i++;}
      html+='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';continue;
    }
    // heading
    let m=ln.match(/^(#{1,3})\s+(.*)/);
    if(m){const lv=m[1].length,txt=m[2];
      if(lv===2){const id='s'+toc.length;toc.push({id,txt});html+='<h2 id="'+id+'">'+inline(txt)+'</h2>';}
      else html+='<h'+lv+'>'+inline(txt)+'</h'+lv+'>';
      i++;continue;}
    if(/^\[chart:(\w+)\]\s*$/.test(ln)){html+='<div class="chart" data-chart="'+ln.match(/^\[chart:(\w+)\]/)[1]+'"></div>';i++;continue;}
    if(/^---+\s*$/.test(ln)){html+='<hr>';i++;continue;}
    if(/^>\s?/.test(ln)){let b='';while(i<lines.length&&/^>\s?/.test(lines[i])){b+=inline(lines[i].replace(/^>\s?/,''))+' ';i++;}html+='<blockquote>'+b+'</blockquote>';continue;}
    if(/^\s*-\s+/.test(ln)){let items='';while(i<lines.length&&/^\s*-\s+/.test(lines[i])){items+='<li>'+inline(lines[i].replace(/^\s*-\s+/,''))+'</li>';i++;}html+='<ul>'+items+'</ul>';continue;}
    // paragraph
    let p='';while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^[#>|-]/.test(lines[i])){p+=lines[i]+' ';i++;}
    html+='<p>'+inline(p.trim())+'</p>';
  }
  return {html,toc};
}
const GJA={COMMON:'コモン',UNCOMMON:'アンコモン',RARE:'レア',LEGENDARY:'レジェンダリー',IMMORTAL:'イモータル',ARCANA:'アルカナ',BEYOND:'ビヨンド',CELESTIAL:'セレスティアル',DIVINE:'ディバイン',COSMIC:'コズミック'};

  const lv=el.querySelector('#cgLv'),lvV=el.querySelector('#cgLvV'),bars=el.querySelector('#cgBars');
  function build(){

      const bw=Math.max(Math.min(p,100),0.6), disp=p<1?p.toFixed(2)+'%':p+'%';
      h+=`<div class="chrow"><div class="lbl" style="width:104px">${GJA[k]}</div><div class="track"><div class="fill" style="width:${bw.toFixed(1)}%;background:${GCOL[k]}"></div></div><div class="pct" style="width:54px">${disp}</div></div>`;});
    bars.innerHTML=h;
  }
  build(); lv.addEventListener('input',build);

// オーバーレベルEXP補正 jwf(基準Lv, 相手Lv)：ステージ討伐EXPもキューブEXPも共用（逆アセンブルで確定）
function olMult(A,delta){
  const d=Math.abs(delta), w=1+Math.log(A+1)/10, above=delta>0;
  const b1=Math.trunc(w*(above?5:2)), b2=Math.trunc(w*(above?6:5)), fl=above?0.4:0.5;
  if(d<=b1) return 1;
  if(d<=b1+b2){const e=(d-b1)/b2; return Math.max(1-(1-fl)*e*e,0.01);}
  return Math.max(Math.pow(0.01/fl,(d-b1-b2)/Math.max(A/3,3))*fl,0.01);
}

  const lv=el.querySelector('#olLv'), lvV=el.querySelector('#olLvV'), it=el.querySelector('#olItem'), itV=el.querySelector('#olItemV'),

      `<text x="${x}" y="${Y1+16}" fill="#9a8f7a" font-size="11" text-anchor="middle">${d>0?'+'+d:d}</text>`+
      ((tl>=1&&tl<=110)?`<text x="${x}" y="${Y1+30}" fill="#c9a86a" font-size="10.5" text-anchor="middle">Lv${tl}</text>`:'');});
    let pts='';for(let d=DMIN;d<=DMAX;d++){pts+=(d===DMIN?'M':'L')+xs(d).toFixed(1)+' '+ys(olMult(A,d)).toFixed(1)+' ';}
    g+=`<path d="${pts}" fill="none" stroke="#d8a657" stroke-width="2.6"/>`;
    // 選択中の装備Lvマーカー
    const dd=itemLv-A, mm=olMult(A,dd);
    if(dd>=DMIN&&dd<=DMAX){const mx=xs(dd),my=ys(mm);g+=`<line x1="${mx}" y1="${Y0}" x2="${mx}" y2="${Y1}" stroke="#f0d98a" stroke-width="1.5" stroke-dasharray="4 3"/>`+
      `<circle cx="${mx}" cy="${my}" r="5" fill="#fff" stroke="#d8a657" stroke-width="2"/>`+
      `<text x="${mx}" y="${my-9}" fill="#f0d98a" font-size="11" font-weight="700" text-anchor="middle">${Math.round(mm*100)}%</text>`;}
    g+=`<text x="${(X0+X1)/2}" y="${Y1+46}" fill="#9a8f7a" font-size="11" text-anchor="middle">相手とのレベル差（下段＝相手の実レベル）</text>`;
    svgBox.innerHTML=`<svg viewBox="0 0 ${X1+18} ${Y1+56}" style="width:100%;height:auto">${g}</svg>`;
    // グレード別ゲージ進捗
    const lr=OL_CSCALE[itemLv]?OL_CSCALE[itemLv]/1000:1, gauge=OL_LVUP[A]||OL_LVUP[100];
    let gh=`<div class="ct">Lv${itemLv}装備を1個入れた時のゲージ進捗（キューブLv${A}→${A+1}、補正後）</div>`;
    ORDER.forEach(k=>{const exp=OL_BASE[k]*lr*sm*mm, pct=exp/gauge*100, disp=pct>=100?(exp/gauge).toFixed(1)+'本':pct.toFixed(pct<1?2:1)+'%', bw=Math.min(pct,100);
      gh+=`<div class="chrow"><div class="lbl" style="width:104px">${GJA[k]}</div><div class="track"><div class="fill" style="width:${bw.toFixed(1)}%;background:${GCOL[k]}"></div></div><div class="pct" style="width:60px">${disp}</div></div>`;});
    grades.innerHTML=gh;
    note.innerHTML=`補正 jwf(Lv${A},Lv${itemLv}) = <b style="color:var(--accent)">${(mm*100).toFixed(mm<0.1?2:0)}%</b>`
      +(OL_CSCALE[itemLv]?'':'　※Lv100はレベル倍率テーブル外＝倍率1扱いで激減')
      +`。満額(100%)はだいたい 相手Lv${A-bNeg}〜${A+bPos}。「本」＝1個でそのレベル数ぶん。`;
  }
  build();
  [lv,it,slot].forEach(c=>c.addEventListener('input',build));
}
function drawCharts(){
  document.querySelectorAll('.chart').forEach(el=>{
    if(el.dataset.chart==='overlevelExp'){drawOverlevelExp(el);return;}
    if(el.dataset.chart==='craftGrade'){drawCraftGrade(el);return;}
    const cd=CHART_DATA[el.dataset.chart];
    if(cd) drawBarList(el,cd);
  });
}
// 自分用メモ（localStorageに保存・リロードしても残る）
(function(){
  const KEY='tbh-info-memo', ta=document.getElementById('memo'), st=document.getElementById('memoStatus');
  try{ta.value=localStorage.getItem(KEY)||'';}catch(e){}
  let t;
  ta.addEventListener('input',()=>{
    try{localStorage.setItem(KEY,ta.value);st.textContent='保存しました ✓';
      clearTimeout(t);t=setTimeout(()=>{st.textContent='この端末に自動保存';},1200);
    }catch(e){st.textContent='保存できません（プライベートモード?）';}
  });
})();
// 旧「ページ内編集」機能の残骸を掃除（過去に保存した上書きデータを削除）
try{localStorage.removeItem('tbh-info-md-override');}catch(e){}
fetch('TBH-解析メモ.md?v='+Date.now(),{cache:'no-store'}).then(r=>r.text()).then(md=>{

}).catch(e=>{document.getElementById('md').innerHTML='<div class="loading">読み込み失敗: '+e+'</div>';});
